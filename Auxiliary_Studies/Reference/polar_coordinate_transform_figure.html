<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coordinate Transform Schematic</title>
  <style>
    :root {
      --bg: #f6f2e8;
      --panel: #fffdf8;
      --ink: #1f2937;
      --line: #ddd3c3;
      --grid: #d9cfbc;
      --green: #0f766e;
      --orange: #c2410c;
      --blue: #1d4ed8;
      --violet: #7c3aed;
      --gray: #4b5563;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 18px;
      background: radial-gradient(circle at top left, #fffaf0 0%, var(--bg) 60%, #eee7d8 100%);
      font-family: Georgia, "Times New Roman", serif;
    }

    .frame {
      max-width: 1360px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 20px 48px rgba(40, 32, 16, 0.10);
      padding: 12px;
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
      background: linear-gradient(180deg, #fffefb 0%, #faf5ea 100%);
    }

    @media print {
      body {
        padding: 0;
        background: #ffffff;
      }

      .frame {
        max-width: none;
        border: none;
        box-shadow: none;
        border-radius: 0;
        padding: 0;
      }
    }
  </style>
</head>
<body>
